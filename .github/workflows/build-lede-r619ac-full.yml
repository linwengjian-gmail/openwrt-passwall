name: Build LEDE full firmware for P&W R619AC 128M

on:
  workflow_dispatch:
    inputs:
      lede_ref:
        description: "coolsnowwolf/lede commit or branch"
        required: true
        default: "a11e66ca74a2d00fb8c6e950f43a4d05b4433559"
      passwall_ref:
        description: "Openwrt-Passwall/openwrt-passwall ref"
        required: true
        default: "main"
      passwall_packages_ref:
        description: "Openwrt-Passwall/openwrt-passwall-packages ref"
        required: true
        default: "main"

env:
  TZ: Asia/Shanghai
  TARGET: ipq40xx
  SUBTARGET: generic
  DEVICE: p2w_r619ac-128m

jobs:
  build:
    name: Build full firmware
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout custom packages
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake curl device-tree-compiler ecj fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gperf haveged help2man intltool libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
            libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp \
            ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply \
            python3-docutils qemu-utils rsync scons squashfs-tools subversion swig texinfo \
            uglifyjs unzip upx-ucl vim wget xmlto xxd zlib1g-dev

      - name: Clone LEDE source
        run: |
          git clone --filter=blob:none https://github.com/coolsnowwolf/lede.git lede
          cd lede
          git checkout "${{ inputs.lede_ref }}"

      - name: Add PassWall feeds
        working-directory: lede
        run: |
          cp feeds.conf.default feeds.conf.default.bak
          {
            echo "src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;${{ inputs.passwall_packages_ref }}"
            echo "src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;${{ inputs.passwall_ref }}"
            cat feeds.conf.default.bak
          } > feeds.conf.default
          cat feeds.conf.default

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: lede/dl
          key: dl-full-${{ env.TARGET }}-${{ env.SUBTARGET }}-${{ inputs.lede_ref }}-${{ inputs.passwall_ref }}-${{ inputs.passwall_packages_ref }}
          restore-keys: |
            dl-full-${{ env.TARGET }}-${{ env.SUBTARGET }}-
            dl-${{ env.TARGET }}-${{ env.SUBTARGET }}-

      - name: Update and install feeds
        working-directory: lede
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Install custom R619 3D theme package
        run: |
          mkdir -p lede/package/custom
          cp -a custom-packages/luci-theme-r619-3d lede/package/custom/

      - name: Generate firmware config
        working-directory: lede
        run: |
          cat > .config <<EOF
          CONFIG_TARGET_${TARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}=y
          CONFIG_TARGET_${TARGET}_${SUBTARGET}_DEVICE_${DEVICE}=y

          CONFIG_ALL_KMODS=n
          CONFIG_ALL_NONSHARED=n
          CONFIG_AUTOREMOVE=n
          CONFIG_DEVEL=y
          CONFIG_CCACHE=y

          CONFIG_PACKAGE_luci=y
          CONFIG_LUCI_LANG_zh_Hans=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-theme-r619-3d=y
          CONFIG_PACKAGE_luci-app-opkg=y

          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-app-passwall_Iptables_Transparent_Proxy=y
          CONFIG_PACKAGE_luci-app-passwall_Nftables_Transparent_Proxy=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Geoview=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Haproxy=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_ShadowsocksR_Libev_Client=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Simple_Obfs=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_SingBox=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_V2ray_Plugin=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray=y

          CONFIG_PACKAGE_luci-app-frpc=y
          CONFIG_PACKAGE_luci-app-frps=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-services=y
          CONFIG_PACKAGE_ddns-scripts-cloudflare=y
          CONFIG_PACKAGE_ddns-scripts_dnspod=y
          CONFIG_PACKAGE_luci-app-ipsec-vpnd=y
          CONFIG_PACKAGE_luci-app-openvpn-server=y
          CONFIG_PACKAGE_luci-app-zerotier=y
          CONFIG_PACKAGE_luci-app-adguardhome=y
          CONFIG_PACKAGE_luci-app-appfilter=y
          CONFIG_PACKAGE_luci-app-tor=y
          CONFIG_PACKAGE_luci-app-nlbwmon=y
          CONFIG_PACKAGE_luci-app-wol=y
          CONFIG_PACKAGE_luci-app-vlmcsd=y
          CONFIG_PACKAGE_luci-app-transmission=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-samba=y
          CONFIG_PACKAGE_luci-app-vsftpd=y
          CONFIG_PACKAGE_luci-app-mwan3=y
          CONFIG_PACKAGE_luci-app-syncdial=y
          CONFIG_PACKAGE_luci-app-turboacc=y
          CONFIG_PACKAGE_TURBOACC_INCLUDE_FLOW_OFFLOADING=y
          CONFIG_PACKAGE_TURBOACC_INCLUDE_BBR_CCA=y
          CONFIG_PACKAGE_luci-app-arpbind=y
          CONFIG_PACKAGE_luci-app-cpufreq=y
          CONFIG_PACKAGE_luci-app-autoreboot=y
          CONFIG_PACKAGE_luci-app-wechatpush=y
          CONFIG_PACKAGE_luci-app-uugamebooster=y
          EOF
          sed -i 's/^[[:space:]]*//' .config
          make defconfig

      - name: Show selected config
        working-directory: lede
        run: |
          grep -E 'CONFIG_TARGET_|CONFIG_PACKAGE_(luci-app|ddns|sing-box|xray|zerotier|frpc|frps|openvpn|strongswan|adguardhome|appfilter|tor|nlbwmon|vlmcsd|transmission|miniupnpd|samba|vsftpd|mwan3|syncdial|wechatpush|uugamebooster|TURBOACC)' .config | sort || true

      - name: Download sources
        working-directory: lede
        run: |
          make download -j"$(nproc)" || make download -j1 V=s

      - name: Build firmware
        working-directory: lede
        run: |
          make -j"$(nproc)" V=s || make -j1 V=s

      - name: Collect artifacts
        working-directory: lede
        run: |
          mkdir -p ../artifact
          cp -v .config ../artifact/build.config
          find bin/targets/${TARGET}/${SUBTARGET} -maxdepth 1 -type f -print -exec cp -v {} ../artifact/ \;
          find bin/targets/${TARGET}/${SUBTARGET} -name "packages.manifest" -exec cp -v {} ../artifact/ \; || true
          find ../artifact -type f -maxdepth 1 -print | sort

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lede-r25-full-ipq40xx-generic-p2w-r619ac-128m
          path: artifact/*
          if-no-files-found: error
